{% extends "base.html" %}
{% block content %}
<div class="auth-card">
    <h2><i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول</h2>
    
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" name="email" required placeholder="example@mail.com">
        </div>
        
        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" name="password" required placeholder="••••••••">
        </div>

        <button type="submit" class="submit-btn"><i class="fa-solid fa-lock-open"></i> دخول</button>
    </form>
    <p class="auth-switch">ليس لديك حساب بعد؟ <a href="{{ url_for('register') }}">أنشئ حسابك الآن</a></p>
</div>
{% endblock %}
