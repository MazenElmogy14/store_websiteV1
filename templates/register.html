{% extends "base.html" %}
{% block content %}
<div class="auth-card">
    <h2><i class="fa-solid fa-user-plus"></i> إنشاء حساب جديد</h2>
    <p class="form-hint">سجل معنا لتسهيل عملية طلب المنتجات وتوصيلها مستقبلاً.</p>

    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label>الاسم الكامل *</label>
            <input type="text" name="name" required placeholder="أدخل اسمك الكريم">
        </div>
        
        <div class="form-group">
            <label>البريد الإلكتروني *</label>
            <input type="email" name="email" required placeholder="example@mail.com">
        </div>

        <div class="form-group">
            <label>كلمة المرور *</label>
            <input type="password" name="password" required placeholder="••••••••">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>رقم الهاتف للتواصل *</label>
                <input type="tel" name="phone" required placeholder="مثال: 01012345678">
            </div>
            <div class="form-group">
                <label>رقم الواتساب (لإتمام الطلبات) *</label>
                <input type="tel" name="whatsapp" required placeholder="مثال: 01012345678">
            </div>
        </div>

        <div class="form-group">
            <label>عنوان التوصيل المعتاد (المدينة - المنطقة - الشارع - رقم العقار)</label>
            <textarea name="address" rows="3" placeholder="اكتب تفاصيل عنوانك لتسهيل الشحن السريع..."></textarea>
        </div>

        <button type="submit" class="submit-btn"><i class="fa-solid fa-check"></i> تسجيل حساب الآن</button>
    </form>
    <p class="auth-switch">لديك حساب بالفعل؟ <a href="{{ url_for('login') }}">سجل دخولك هنا</a></p>
</div>
{% endblock %}
